<!DOCTYPE html>
<!-- saved from url=(0043)file:///C:/Users/tt/Downloads/index_42.html -->
<html lang="th"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เติมเงินบัตรนักเรียน</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", "Sarabun", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 16px;
    color: #333;
  }
  .container {
    max-width: 480px;
    margin: 0 auto;
    background: white;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 10px 40px rgba(0,0,0,.15);
  }
  h1 { font-size: 22px; text-align: center; margin-bottom: 8px; color: #4a3f8a; }
  .subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 20px; }
  .qr-box {
    background: #f8f9fc;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    margin-bottom: 20px;
    border: 2px dashed #c5c5e0;
  }
  .qr-box img { max-width: 220px; width: 100%; }
  .qr-box p { font-size: 13px; color: #666; margin-top: 8px; }
  label { display: block; font-size: 14px; margin: 12px 0 6px; font-weight: 600; }
  input, textarea {
    width: 100%;
    padding: 12px;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    font-size: 16px;
    font-family: inherit;
  }
  input:focus, textarea:focus { outline: none; border-color: #667eea; }
  .row { display: flex; gap: 10px; }
  .row > div { flex: 1; }
  .file-box {
    border: 2px dashed #c5c5e0;
    border-radius: 8px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    background: #fafbfd;
  }
  .file-box.has-file { border-style: solid; border-color: #4caf50; background: #f1f8f1; }
  #slipPreview { max-width: 100%; max-height: 200px; margin-top: 10px; border-radius: 6px; }
  button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    margin-top: 20px;
    cursor: pointer;
  }
  button:disabled { opacity: .6; cursor: wait; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    padding: 14px 24px; border-radius: 30px; color: white; font-weight: 500;
    box-shadow: 0 4px 20px rgba(0,0,0,.2); display: none; z-index: 99;
    white-space: nowrap;
  }
  .toast.success { background: #4caf50; display: block; }
  .toast.error { background: #f44336; display: block; }
</style>
</head>
<body>
<div class="container">
  <h1>💳 เติมเงินบัตรนักเรียน</h1>
  <p class="subtitle">สแกน QR โอนเงิน แล้วกรอกข้อมูลด้านล่าง</p>

  <div class="qr-box">
    <img src="./index_files/qr-promptpay.jpg" alt="QR PromptPay" style="max-width:220px;width:100%">
    <p>📱 พร้อมเพย์ PromptPay<br>ในนาม: <strong>โรงเรียนนิมิตศึกษา เพื่อกิจกรรม</strong><br>
    <small style="color:#aaa">เลขอ้างอิง: KPS004KB000002297827</small></p>
  </div>

  <form id="topupForm">
    <label>ชื่อ-นามสกุลนักเรียน *</label>
    <input type="text" id="studentName" required="" placeholder="เช่น ด.ช.สมชาย ใจดี">

    <label>ชั้น *</label>
    <input type="text" id="studentClass" required="" placeholder="เช่น ป.3/2">

    <label>จำนวนเงิน (บาท) *</label>
    <input type="number" id="amount" required="" min="1" step="1" placeholder="500" inputmode="numeric">

    <label>หมายเหตุ (ถ้ามี)</label>
    <textarea id="note" rows="2" placeholder="เช่น เติมสำหรับ 2 สัปดาห์"></textarea>

    <label>แนบสลิปการโอน *</label>
    <div class="file-box" id="fileBox" onclick="document.getElementById(&#39;slip&#39;).click()">
      <span id="fileText">📷 แตะเพื่อเลือกหรือถ่ายรูปสลิป</span>
      <img id="slipPreview" style="display:none">
    </div>
    <input type="file" id="slip" accept="image/*" capture="environment" required="" style="display:none">

    <button type="submit" id="submitBtn">📤 ส่งแจ้งเติมเงิน</button>
  </form>
</div>

<div class="toast" id="toast"></div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx0g19PEgB5VJNBwSRekHLNL_SXvzY94ABh_bBbFNr_J8cPRNFw2LtnDNPnq_aRxr4x/exec';

  const form      = document.getElementById('topupForm');
  const slipInput = document.getElementById('slip');
  const fileBox   = document.getElementById('fileBox');
  const fileText  = document.getElementById('fileText');
  const preview   = document.getElementById('slipPreview');
  const btn       = document.getElementById('submitBtn');
  const toast     = document.getElementById('toast');

  let slipBase64 = null, slipMimeType = null, slipExt = null;

  slipInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    slipMimeType = file.type;
    slipExt = file.name.split('.').pop().toLowerCase();
    const reader = new FileReader();
    reader.onload = ev => {
      slipBase64 = ev.target.result;
      preview.src = slipBase64;
      preview.style.display = 'block';
      fileText.textContent = '✅ เลือกสลิปแล้ว (แตะเพื่อเปลี่ยน)';
      fileBox.classList.add('has-file');
    };
    reader.readAsDataURL(file);
  });

  function showToast(msg, type) {
    toast.textContent = msg;
    toast.className = 'toast ' + type;
    setTimeout(() => { toast.className = 'toast'; }, 4000);
  }

  form.addEventListener('submit', async e => {
    e.preventDefault();
    if (!slipBase64) { showToast('กรุณาแนบสลิป', 'error'); return; }

    btn.disabled = true;
    btn.textContent = '⏳ กำลังส่ง...';

    const payload = {
      studentName:   document.getElementById('studentName').value.trim(),
      studentClass:  document.getElementById('studentClass').value.trim(),
      studentNumber: '-',
      amount:        document.getElementById('amount').value,
      note:          document.getElementById('note').value.trim(),
      slipBase64, slipMimeType, slipExt
    };

    try {
      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify(payload)
      });
      const result = await res.json();
      if (result.ok) {
        showToast('✅ ส่งเรียบร้อย รอครูตรวจสอบ', 'success');
        form.reset();
        preview.style.display = 'none';
        fileText.textContent = '📷 แตะเพื่อเลือกหรือถ่ายรูปสลิป';
        fileBox.classList.remove('has-file');
        slipBase64 = null;
      } else {
        showToast('เกิดข้อผิดพลาด: ' + result.error, 'error');
      }
    } catch (err) {
      showToast('ส่งไม่สำเร็จ: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '📤 ส่งแจ้งเติมเงิน';
    }
  });
</script>


</body></html>
